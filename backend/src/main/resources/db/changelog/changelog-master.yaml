  - changeSet:
      id: 005-seed-reservations
      author: rumeln
      changes:
        - insert:
            tableName: reservation
            columns:
              - column: { name: table_id, valueComputed: "(SELECT id FROM restaurant_table WHERE name = 'T01')" }
              - column: { name: reservation_date, valueComputed: "CURRENT_DATE" }
              - column: { name: start_time, value: "18:00:00" }
              - column: { name: end_time, value: "19:30:00" }
              - column: { name: party_size, valueNumeric: "2" }
