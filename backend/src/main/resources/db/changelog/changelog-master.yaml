databaseChangeLog:
  - changeSet:
      id: 001-create-restaurant-table
      author: rumeln
      changes:
        - createTable:
            tableName: restaurant_table
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_restaurant_table
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: capacity
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: capacity > 0
              - column:
                  name: zone
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: x_position
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: x_position >= 0
              - column:
                  name: y_position
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: y_position >= 0
              - column:
                  name: width
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: width > 0
              - column:
                  name: height
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: height > 0
              - column:
                  name: window_side
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: quiet_area
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: accessible
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: near_play_area
                  type: BOOLEAN
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-create-reservation-table
      author: rumeln
      changes:
        - createTable:
            tableName: reservation
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_reservation
              - column:
                  name: table_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: reservation_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
                    checkConstraint: end_time > start_time
              - column:
                  name: party_size
                  type: INT
                  constraints:
                    nullable: false
                    checkConstraint: party_size > 0
  - changeSet:
      id: 003-add-reservation-table-fk
      author: rumeln
      changes:
        - addForeignKeyConstraint:
            baseTableName: reservation
            baseColumnNames: table_id
            constraintName: fk_reservation_table_id
            referencedTableName: restaurant_table
            referencedColumnNames: id
  - changeSet:
      id: 004-seed-restaurant-tables
      author: rumeln
      changes:
        - insert:
            tableName: restaurant_table
            columns:
              - column: { name: name, value: T01 }
              - column: { name: capacity, valueNumeric: 2 }
              - column: { name: zone, value: MAIN }
              - column: { name: x_position, valueNumeric: 1 }
              - column: { name: y_position, valueNumeric: 1 }
              - column: { name: width, valueNumeric: 2 }
              - column: { name: height, valueNumeric: 2 }
              - column: { name: window_side, valueBoolean: false }
              - column: { name: quiet_area, valueBoolean: false }
              - column: { name: accessible, valueBoolean: true }
              - column: { name: near_play_area, valueBoolean: false }
