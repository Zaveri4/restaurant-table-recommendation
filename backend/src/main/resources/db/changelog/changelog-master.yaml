databaseChangeLog:
  - changeSet:
      id: 001-create-table
      author: you
      changes:
        - createTable:
            tableName: example
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false