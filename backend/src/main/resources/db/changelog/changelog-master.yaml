              - column: { name: start_time, value: "18:30:00" }
              - column: { name: end_time, value: "20:30:00" }
              - column: { name: party_size, valueNumeric: "5" }
        - insert:
            tableName: reservation
            columns:
              - column: { name: table_id, valueComputed: "(SELECT id FROM restaurant_table WHERE name = 'T09')" }
              - column: { name: reservation_date, valueComputed: "(CURRENT_DATE + INTERVAL '1 day')::date" }
              - column: { name: start_time, value: "21:00:00" }
              - column: { name: end_time, value: "22:30:00" }
