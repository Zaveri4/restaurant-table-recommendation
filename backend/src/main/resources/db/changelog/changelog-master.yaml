      author: rumeln
      changes:
        - update:
            tableName: restaurant_table
            columns:
              - column:
                  name: zone
                  value: PRIVATE
            where: zone = 'QUIET'
        - update:
            tableName: restaurant_table
            columns:
              - column:
                  name: zone
                  value: TERRACE
            where: zone = 'WINDOW'
