              - column: { name: x_position, valueNumeric: "1" }
              - column: { name: y_position, valueNumeric: "1" }
              - column: { name: width, valueNumeric: "2" }
              - column: { name: height, valueNumeric: "2" }
              - column: { name: window_side, valueBoolean: "false" }
              - column: { name: quiet_area, valueBoolean: "false" }
              - column: { name: accessible, valueBoolean: "true" }
              - column: { name: near_play_area, valueBoolean: "false" }
