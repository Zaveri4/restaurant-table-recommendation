services:
  db:
    image: postgres:17
    container_name: restaurant-postgres
    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant"]
      interval: 5s
      timeout: 3s
      retries: 10
  backend:
    build:
      context: ./backend
    container_name: restaurant-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/restaurant
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
    container_name: restaurant-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db-data:
